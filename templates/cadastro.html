<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar conta — Dose Certa</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <nav>
    <a href="{{ url_for('index') }}" class="logo">💊 Dose Certa</a>
    <div class="nav-links">
      <a href="{{ url_for('cadastro') }}" class="ativo">Criar conta grátis</a>
      <a href="{{ url_for('login') }}">Entrar na minha conta</a>
    </div>
  </nav>

  <div class="container" style="max-width:520px; padding-top:3rem;">
    <h1>Criar conta grátis</h1>
    <p class="subtitulo">Organizamos seus remédios com carinho</p>

    <div class="card">
      {% if erro %}
        <div class="alerta-erro">{{ erro }}</div>
      {% endif %}

      <form method="POST" action="{{ url_for('cadastro') }}">
        <div class="campo">
          <label for="nome">Nome completo</label>
          <input type="text" id="nome" name="nome" placeholder="Antonio da Silva" required>
        </div>

        <div class="campo">
          <label for="cpf">CPF</label>
          <input type="text" id="cpf" name="cpf" placeholder="999.999.999-99" required>
        </div>

        <div class="campo">
          <label for="telefone">Telefone (com DDD)</label>
          <input type="tel" id="telefone" name="telefone" placeholder="11 99199-2993" required>
        </div>

        <div class="campo">
          <label for="idade">Idade (em anos)</label>
          <input type="number" id="idade" name="idade" placeholder="De 18 a 99" min="18" max="99" required>
        </div>

        <div class="campo">
          <label for="senha">Senha (só números)</label>
          <input type="password" id="senha" name="senha" placeholder="••••••" required>
        </div>

        <button type="submit" class="btn btn-primary">Criar conta grátis</button>
      </form>

      <p class="link-aux">
        Já tem conta? <a href="{{ url_for('login') }}">Entrar na minha conta</a>
      </p>
    </div>
  </div>

</body>
</html>
